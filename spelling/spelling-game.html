<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tricky Words — Learn to Spell!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --primary: #FF6B4A;
    --primary-glow: #FF6B4A40;
    --secondary: #4ECDC4;
    --secondary-glow: #4ECDC440;
    --accent: #FFE66D;
    --accent-dark: #F0D000;
    --purple: #A78BFA;
    --pink: #F472B6;
    --text: #2D3436;
    --text-light: #636E72;
    --success: #22C55E;
    --success-bg: #DCFCE7;
    --error: #EF4444;
    --error-bg: #FEE2E2;
    --canvas-bg: #FEFEFE;
    --canvas-line: #E8E4DF;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -120px;
    right: -120px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px;
    left: -100px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }
  .header h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--primary), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 0.95rem;
    color: var(--text-light);
    font-weight: 600;
    margin-top: 2px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    flex: 1;
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .stat-card.streak { border-color: var(--accent); }
  .stat-card.score { border-color: var(--secondary); }
  .stat-card.phase-stat { border-color: var(--purple); }
  .stat-icon { font-size: 1.3rem; }
  .stat-value {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .stat-card.streak .stat-value { color: var(--accent-dark); }
  .stat-card.score .stat-value { color: var(--secondary); }
  .stat-card.phase-stat .stat-value { color: var(--purple); }
  .stat-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
  }

  /* Phase selector */
  .phase-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .phase-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 8px 16px;
    border-radius: 50px;
    border: 2.5px solid #E0DCD7;
    background: var(--card);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.25s;
  }
  .phase-btn:hover { border-color: var(--purple); color: var(--purple); }
  .phase-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
    box-shadow: 0 3px 12px rgba(167,139,250,0.4);
  }

  /* Audio settings (speed + accent selectors) */
  .audio-settings {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 8px 10px;
    background: #FAF7F4;
    border-radius: var(--radius-sm);
  }
  .audio-label {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-light);
    white-space: nowrap;
  }
  .audio-divider {
    width: 1px;
    height: 16px;
    background: #DDD9D4;
    flex-shrink: 0;
  }
  .speed-btn, .accent-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 5px 11px;
    border-radius: 50px;
    border: 2px solid #E0DCD7;
    background: var(--card);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.25s;
  }
  .speed-btn:hover { border-color: var(--purple); color: var(--purple); }
  .speed-btn.active {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
    box-shadow: 0 3px 10px rgba(167,139,250,0.4);
  }
  .accent-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  .accent-btn.active {
    background: var(--secondary);
    border-color: var(--secondary);
    color: white;
    box-shadow: 0 3px 10px rgba(78,205,196,0.4);
  }

  /* Game card */
  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: var(--shadow-lg);
    margin-bottom: 16px;
  }

  /* Word prompt */
  .word-prompt {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .listen-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--primary), #FF8A6B);
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 4px 16px var(--primary-glow);
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .listen-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px var(--primary-glow); }
  .listen-btn:active { transform: scale(0.95); }
  .listen-btn.speaking {
    animation: pulse-ring 1s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 var(--primary-glow); }
    50% { box-shadow: 0 0 0 16px transparent; }
  }
  .prompt-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text-light);
    text-align: left;
    line-height: 1.3;
  }
  .prompt-text strong {
    color: var(--text);
  }

  /* Canvas area */
  .canvas-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #E8E4DF;
    background: var(--canvas-bg);
    margin-bottom: 16px;
    touch-action: none;
    transition: border-color 0.3s;
  }
  .canvas-wrapper.drawing { border-color: var(--secondary); }
  .canvas-wrapper.correct { border-color: var(--success); }
  .canvas-wrapper.wrong { border-color: var(--error); }

  canvas {
    display: block;
    width: 100%;
    cursor: crosshair;
    touch-action: none;
  }

  .canvas-placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    color: #C8C2BA;
    font-weight: 600;
    font-size: 1rem;
    opacity: 1;
    transition: opacity 0.3s;
  }
  .canvas-placeholder.hidden { opacity: 0; }
  .canvas-placeholder .pencil-icon { font-size: 2rem; display: block; margin-bottom: 6px; }

  /* Buttons row */
  .buttons-row {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-check {
    background: linear-gradient(135deg, var(--secondary), #3DB8B0);
    color: white;
    box-shadow: 0 4px 16px var(--secondary-glow);
    flex: 2;
  }
  .btn-check:hover:not(:disabled) { box-shadow: 0 6px 24px var(--secondary-glow); }

  .btn-clear {
    background: #F1EDEA;
    color: var(--text-light);
  }
  .btn-clear:hover { background: #E8E4DF; }

  .btn-skip {
    background: #F1EDEA;
    color: var(--text-light);
  }
  .btn-skip:hover { background: #E8E4DF; }

  .btn-next {
    background: linear-gradient(135deg, var(--primary), #FF8A6B);
    color: white;
    box-shadow: 0 4px 16px var(--primary-glow);
    flex: 1;
  }

  /* Feedback */
  .feedback {
    text-align: center;
    padding: 16px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 1.1rem;
    animation: feedback-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes feedback-pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .feedback.correct {
    background: var(--success-bg);
    color: #166534;
  }
  .feedback.wrong {
    background: var(--error-bg);
    color: #991B1B;
  }
  .feedback .answer-reveal {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.6rem;
    display: block;
    margin-top: 6px;
    letter-spacing: 3px;
  }

  /* Fallback prompt */
  .fallback-prompt {
    text-align: center;
    margin-bottom: 16px;
    animation: feedback-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .fallback-prompt p {
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 10px;
    font-size: 0.95rem;
  }
  .fallback-prompt .answer-display {
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    color: var(--purple);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .fallback-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .fallback-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px 24px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
  }
  .fallback-btn:active { transform: scale(0.95); }
  .fallback-btn.yes {
    background: var(--success);
    color: white;
  }
  .fallback-btn.no {
    background: var(--error);
    color: white;
  }
  .fallback-btn.retry {
    background: var(--accent);
    color: var(--text);
  }

  /* Progress bar */
  .progress-section {
    margin-bottom: 16px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 10px;
    background: #EDE9E4;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--secondary), var(--purple));
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,248,240,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 5px solid #EDE9E4;
    border-top: 5px solid var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-weight: 700;
    color: var(--text-light);
    font-size: 1rem;
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 99;
  }

  /* Keyboard input fallback */
  .keyboard-section {
    margin-bottom: 16px;
  }
  .keyboard-input {
    width: 100%;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    text-align: center;
    padding: 14px;
    border: 3px solid #E8E4DF;
    border-radius: var(--radius-sm);
    background: var(--canvas-bg);
    color: var(--text);
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.3s;
  }
  .keyboard-input:focus { border-color: var(--secondary); }
  .keyboard-input.correct { border-color: var(--success); }
  .keyboard-input.wrong { border-color: var(--error); }

  .input-mode-toggle {
    text-align: center;
    margin-bottom: 12px;
  }
  .toggle-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
  }
  .toggle-btn:hover { color: var(--purple); }

  /* Tablet mode toggle button */
  .tablet-toggle {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 50px;
    border: 2px solid #E0DCD7;
    background: var(--card);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.25s;
  }
  .tablet-toggle:hover { border-color: var(--pink); color: var(--pink); }
  .tablet-toggle.active {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
    box-shadow: 0 3px 10px rgba(244,114,182,0.4);
  }
  .header-toggles {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 4px;
  }

  /* Tablet mode layout */
  .app.tablet-mode { padding: 12px 12px 20px; }
  .app.tablet-mode .stats-bar,
  .app.tablet-mode .phase-selector,
  .app.tablet-mode .progress-section { display: none; }
  .app.tablet-mode .header { margin-bottom: 8px; }
  .app.tablet-mode .header .subtitle { display: none; }
  .app.tablet-mode .game-card { padding: 12px 12px 16px; }

  /* Landscape mode */
  .app.landscape-mode {
    max-width: 100%;
    padding: 8px 10px 10px;
  }

  .app.landscape-mode .game-card {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 10px;
    padding: 10px;
    min-height: calc(100vh - 70px);
    align-items: start;
  }

  /* Canvas spans entire left column */
  .app.landscape-mode #canvas-section {
    grid-column: 1;
    grid-row: 1 / 99;
  }

  .app.landscape-mode .canvas-wrapper {
    height: calc(100vh - 90px);
  }

  .app.landscape-mode canvas {
    height: 100% !important;
    width: 100% !important;
  }

  /* Right-column items */
  .app.landscape-mode .audio-settings { grid-column: 2; }
  .app.landscape-mode .word-prompt { grid-column: 2; }
  .app.landscape-mode .input-mode-toggle { grid-column: 2; }
  .app.landscape-mode #keyboard-section { grid-column: 2; }
  .app.landscape-mode #feedback-area { grid-column: 2; }
  .app.landscape-mode #buttons-main { grid-column: 2; }
  .app.landscape-mode #buttons-next { grid-column: 2; }

  /* Narrow landscape (< 900px): tighter columns */
  @media (max-width: 900px) {
    .app.landscape-mode .game-card {
      grid-template-columns: 1.2fr 1fr;
    }
  }

  /* Phone landscape (height < 500px): compact controls */
  @media (max-height: 500px) {
    .app.landscape-mode .audio-settings { padding: 4px 8px; }
    .app.landscape-mode .listen-btn { width: 44px; height: 44px; font-size: 1.3rem; }
    .app.landscape-mode .btn { padding: 10px; font-size: 0.9rem; }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .header h1 { font-size: 1.6rem; }
    .stat-value { font-size: 1.2rem; }
    .listen-btn { width: 54px; height: 54px; font-size: 1.5rem; }
  }

  /* Toast notification */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(45,52,54,0.88);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 20px;
    border-radius: 50px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
  }
  #toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1>✨ Tricky Words</h1>
    <div class="subtitle">Listen, Write, Learn!</div>
    <div class="header-toggles">
      <button class="tablet-toggle" id="pencil-toggle">✏️ Pencil</button>
      <button class="tablet-toggle" id="tablet-toggle">📐 Tablet</button>
      <button class="tablet-toggle" id="landscape-toggle">🔄 Landscape</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card streak">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat-card score">
      <div class="stat-icon">⭐</div>
      <div class="stat-value" id="score">0</div>
      <div class="stat-label">Stars</div>
    </div>
    <div class="stat-card phase-stat">
      <div class="stat-icon">📖</div>
      <div class="stat-value" id="words-done">0<span style="font-size:0.8rem;font-weight:500;color:var(--text-light)">/<span id="words-total">0</span></span></div>
      <div class="stat-label">Words</div>
    </div>
  </div>

  <!-- Phase selector -->
  <div class="phase-selector" id="phase-selector"></div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Game card -->
  <div class="game-card">
    <!-- Word prompt -->
    <div class="word-prompt">
      <button class="listen-btn" id="listen-btn" title="Listen to the word">🔊</button>
      <div class="prompt-text">
        Tap the speaker to hear the word, then <strong>write it below!</strong>
      </div>
    </div>

    <!-- Audio settings -->
    <div class="audio-settings">
      <span class="audio-label">Speed:</span>
      <button class="speed-btn" data-rate="0.6">🐢 Slow</button>
      <button class="speed-btn active" data-rate="0.85">🚶 Normal</button>
      <button class="speed-btn" data-rate="1.1">🐇 Fast</button>
      <div class="audio-divider"></div>
      <div id="accent-selector" style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="accent-btn active" data-lang="en-GB">🇬🇧 British</button>
        <button class="accent-btn" data-lang="en-US">🇺🇸 American</button>
        <button class="accent-btn" data-lang="en-AU">🇦🇺 Australian</button>
      </div>
    </div>

    <!-- Input mode toggle -->
    <div class="input-mode-toggle">
      <button class="toggle-btn" id="mode-toggle">Switch to keyboard ⌨️</button>
    </div>

    <!-- Canvas input -->
    <div id="canvas-section">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="draw-canvas" height="180"></canvas>
        <div class="canvas-placeholder" id="canvas-placeholder">
          <span class="pencil-icon">✏️</span>
          Write the word here
        </div>
      </div>
    </div>

    <!-- Keyboard input (hidden by default) -->
    <div id="keyboard-section" class="keyboard-section" style="display:none;">
      <input type="text" class="keyboard-input" id="keyboard-input" placeholder="type here..." autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>

    <!-- Feedback area -->
    <div id="feedback-area"></div>

    <!-- Buttons -->
    <div class="buttons-row" id="buttons-main">
      <button class="btn btn-clear" id="btn-clear">🗑️ Clear</button>
      <button class="btn btn-check" id="btn-check">✅ Check</button>
      <button class="btn btn-skip" id="btn-skip">⏭️ Skip</button>
    </div>
    <div class="buttons-row" id="buttons-next" style="display:none;">
      <button class="btn btn-next" id="btn-next">Next Word →</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Recognizing your writing...</div>
</div>

<script>
// ==================== WORD DATA ====================
const PHASES = {
  2: { label: 'Phase 2', words: ['I', 'no', 'go', 'the', 'to', 'into'] },
  3: { label: 'Phase 3', words: ['he', 'she', 'we', 'me', 'be', 'was', 'my', 'you', 'her', 'they', 'all', 'are'] },
  4: { label: 'Phase 4', words: ['said', 'have', 'like', 'so', 'do', 'some', 'come', 'were', 'there', 'little', 'one', 'when', 'out', 'what'] },
  5: { label: 'Phase 5', words: ['oh', 'their', 'people', 'Mr', 'Mrs', 'looked', 'called', 'asked', 'could', 'water', 'where', 'who', 'again', 'thought', 'through', 'work', 'mouse', 'many', 'laughed', 'because', 'different', 'any', 'eyes', 'friends', 'once', 'please'] },
};

const CHEERS = [
  '🎉 Amazing!', '⭐ Brilliant!', '🌟 Super!', '💪 Well done!',
  '🏆 Champion!', '✨ Fantastic!', '🚀 Awesome!', '🎯 Perfect!',
  '👏 Great job!', '🌈 Wonderful!'
];
const ENCOURAGEMENTS = [
  "Almost! Let's try again 💪", "Good try! Look carefully 👀",
  "So close! You've got this! 🌟", "Keep going, you're learning! 📚"
];

// ==================== STATE ====================
let state = {
  phase: 2,
  wordIndex: 0,
  streak: 0,
  score: 0,
  completed: new Set(),
  wordOrder: [],
  isCanvasMode: true,
  hasDrawn: false,
  isChecking: false,
  tabletMode: false,
  pencilOnly: false,
  landscapeMode: false,
  landscapeManual: false,
};

// ==================== SPEECH ====================
let selectedAccentLang = 'en-GB';
let selectedSpeed = 0.85;

function speak(text, rate = null) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = selectedAccentLang;
    utter.rate = rate !== null ? rate : selectedSpeed;
    utter.pitch = 1.0;
    // Try to pick a good voice for the selected accent
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang === selectedAccentLang && v.name.includes('Female'))
      || voices.find(v => v.lang === selectedAccentLang)
      || voices.find(v => v.lang.startsWith('en'));
    if (preferred) utter.voice = preferred;
    utter.onend = resolve;
    utter.onerror = resolve;
    speechSynthesis.speak(utter);
  });
}

// Accent selector
document.getElementById('accent-selector').addEventListener('click', (e) => {
  const btn = e.target.closest('.accent-btn');
  if (!btn) return;
  document.querySelectorAll('.accent-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedAccentLang = btn.dataset.lang;
});

// Speed selector
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSpeed = parseFloat(btn.dataset.rate);
  });
});

// Tablet mode toggle
document.getElementById('tablet-toggle').addEventListener('click', function() {
  state.tabletMode = !state.tabletMode;
  state.landscapeManual = false;  // reset manual override

  this.classList.toggle('active', state.tabletMode);
  document.getElementById('app').classList.toggle('tablet-mode', state.tabletMode);

  if (state.tabletMode && landscapeQuery.matches) {
    state.landscapeMode = true;
  } else if (!state.tabletMode) {
    state.landscapeMode = false;
  }
  updateLandscapeUI();
  resizeCanvas();
});

// Pencil-only toggle
document.getElementById('pencil-toggle').addEventListener('click', function() {
  state.pencilOnly = !state.pencilOnly;
  updatePencilToggleUI();
});

// Landscape toggle
document.getElementById('landscape-toggle').addEventListener('click', function() {
  state.landscapeMode = !state.landscapeMode;
  state.landscapeManual = true;
  updateLandscapeUI();
  resizeCanvas();
});

async function autoSpeak() {
  const word = getCurrentWord();
  if (!word) return;
  const btn = document.getElementById('listen-btn');
  btn.classList.add('speaking');
  await speak(word);
  btn.classList.remove('speaking');
}

// Preload voices
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}

// ==================== CANVAS ====================
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');
let drawing = false;
let paths = [];
let currentPath = [];

function resizeCanvas() {
  const rect = wrapper.getBoundingClientRect();
  canvas.width = rect.width * 2; // retina
  if (state.landscapeMode) {
    // Height driven by CSS; just sync the internal buffer height
    canvas.height = rect.height * 2 || canvas.height;
    // Don't override canvas.style.height — CSS controls it
  } else if (state.tabletMode) {
    const vh = window.innerHeight;
    const targetPx = window.innerWidth < 768 ? Math.round(vh * 0.50) : Math.round(vh * 0.62);
    canvas.height = targetPx * 2;
    canvas.style.height = targetPx + 'px';
  } else {
    canvas.height = 360;
    canvas.style.height = '180px';
  }
  redrawCanvas();
}

function redrawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw guide lines
  ctx.strokeStyle = '#E8E4DF';
  ctx.lineWidth = 1;
  const midY = canvas.height / 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(20, midY);
  ctx.lineTo(canvas.width - 20, midY);
  ctx.stroke();
  ctx.setLineDash([]);
  // Bottom line
  ctx.beginPath();
  ctx.moveTo(20, midY + 60);
  ctx.lineTo(canvas.width - 20, midY + 60);
  ctx.stroke();

  // Draw all paths
  ctx.strokeStyle = '#2D3436';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const path of paths) {
    if (path.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function startDraw(e) {
  // Auto-detect stylus and enable pencil-only mode
  if (e.pointerType === 'pen' && !state.pencilOnly) {
    state.pencilOnly = true;
    updatePencilToggleUI();
    showToast('✏️ Pencil mode activated');
  }

  // In pencil-only mode, ignore non-pen input
  if (state.pencilOnly && e.pointerType !== 'pen') return;

  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  if (state.isChecking) return;
  drawing = true;
  state.hasDrawn = true;
  document.getElementById('canvas-placeholder').classList.add('hidden');
  wrapper.classList.add('drawing');
  const pos = getPos(e);
  currentPath = [pos];
  paths.push(currentPath);
}

function moveDraw(e) {
  if (state.pencilOnly && e.pointerType !== 'pen') return;
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  // Vary line width by pressure if available
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  const lineW = 2 + pressure * 6;
  currentPath.push(pos);
  if (currentPath.length > 1) {
    ctx.strokeStyle = '#2D3436';
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(currentPath[currentPath.length - 2].x, currentPath[currentPath.length - 2].y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
}

function endDraw(e) {
  if (state.pencilOnly && e.pointerType !== 'pen') return;
  drawing = false;
  wrapper.classList.remove('drawing');
}

canvas.addEventListener('pointerdown', startDraw);
canvas.addEventListener('pointermove', moveDraw);
canvas.addEventListener('pointerup', endDraw);
canvas.addEventListener('pointerleave', endDraw);
canvas.addEventListener('pointercancel', endDraw);

// Palm rejection: when pencil-only mode is ON, block all finger touches globally
document.addEventListener('touchstart', function(e) {
  if (!state.pencilOnly) return;
  e.preventDefault();
}, { passive: false, capture: true });

function clearCanvas() {
  paths = [];
  currentPath = [];
  state.hasDrawn = false;
  document.getElementById('canvas-placeholder').classList.remove('hidden');
  wrapper.classList.remove('correct', 'wrong');
  redrawCanvas();
}

function updatePencilToggleUI() {
  const btn = document.getElementById('pencil-toggle');
  if (!btn) return;
  btn.classList.toggle('active', state.pencilOnly);
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('visible'), 2000);
}

function updateLandscapeUI() {
  const btn = document.getElementById('landscape-toggle');
  if (btn) btn.classList.toggle('active', state.landscapeMode);
  document.getElementById('app').classList.toggle('landscape-mode', state.landscapeMode);
}

// ==================== OCR ====================
let tesseractWorker = null;

async function initTesseract() {
  if (tesseractWorker) return;
  tesseractWorker = await Tesseract.createWorker('eng', 1, {
    logger: () => {},
  });
  await tesseractWorker.setParameters({
    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
    tessedit_pageseg_mode: '8', // single word
  });
}

async function recognizeCanvas() {
  // Step 1: Find bounding box of all strokes
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const path of paths) {
    for (const p of path) {
      minX = Math.min(minX, p.x);
      minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x);
      maxY = Math.max(maxY, p.y);
    }
  }
  if (minX === Infinity) return '';

  // Step 2: Add generous padding around the strokes
  const pad = 40;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(canvas.width, maxX + pad);
  maxY = Math.min(canvas.height, maxY + pad);
  const cropW = maxX - minX;
  const cropH = maxY - minY;

  // Step 3: Draw strokes on a cropped canvas with thick black lines
  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = cropW;
  cropCanvas.height = cropH;
  const cropCtx = cropCanvas.getContext('2d');
  cropCtx.fillStyle = '#FFFFFF';
  cropCtx.fillRect(0, 0, cropW, cropH);
  cropCtx.strokeStyle = '#000000';
  cropCtx.lineWidth = 8;
  cropCtx.lineCap = 'round';
  cropCtx.lineJoin = 'round';
  for (const path of paths) {
    if (path.length < 2) continue;
    cropCtx.beginPath();
    cropCtx.moveTo(path[0].x - minX, path[0].y - minY);
    for (let i = 1; i < path.length; i++) {
      cropCtx.lineTo(path[i].x - minX, path[i].y - minY);
    }
    cropCtx.stroke();
  }

  // Step 4: Scale up to a standard height for Tesseract (target ~100px tall)
  const targetH = 120;
  const scale = targetH / cropH;
  const scaledW = Math.round(cropW * scale);
  const scaledH = targetH;

  const scaledCanvas = document.createElement('canvas');
  // Add extra white padding around the scaled image
  const outerPad = 30;
  scaledCanvas.width = scaledW + outerPad * 2;
  scaledCanvas.height = scaledH + outerPad * 2;
  const scaledCtx = scaledCanvas.getContext('2d');
  scaledCtx.fillStyle = '#FFFFFF';
  scaledCtx.fillRect(0, 0, scaledCanvas.width, scaledCanvas.height);
  scaledCtx.imageSmoothingEnabled = true;
  scaledCtx.imageSmoothingQuality = 'high';
  scaledCtx.drawImage(cropCanvas, outerPad, outerPad, scaledW, scaledH);

  // Step 5: Binarize — convert to pure black & white with threshold
  const imgData = scaledCtx.getImageData(0, 0, scaledCanvas.width, scaledCanvas.height);
  const d = imgData.data;
  const threshold = 140;
  for (let i = 0; i < d.length; i += 4) {
    const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
    const val = gray < threshold ? 0 : 255;
    d[i] = d[i+1] = d[i+2] = val;
    d[i+3] = 255;
  }
  scaledCtx.putImageData(imgData, 0, 0);

  // Step 6: Dilate — thicken the black strokes by 1px for better OCR
  const dilatedCanvas = document.createElement('canvas');
  dilatedCanvas.width = scaledCanvas.width;
  dilatedCanvas.height = scaledCanvas.height;
  const dilCtx = dilatedCanvas.getContext('2d');
  dilCtx.fillStyle = '#FFFFFF';
  dilCtx.fillRect(0, 0, dilatedCanvas.width, dilatedCanvas.height);
  const srcData = scaledCtx.getImageData(0, 0, scaledCanvas.width, scaledCanvas.height);
  const dstData = dilCtx.createImageData(scaledCanvas.width, scaledCanvas.height);
  const w = scaledCanvas.width, h = scaledCanvas.height;
  // Fill white
  for (let i = 0; i < dstData.data.length; i += 4) {
    dstData.data[i] = dstData.data[i+1] = dstData.data[i+2] = 255;
    dstData.data[i+3] = 255;
  }
  // Dilate: if any neighbor is black, make this pixel black
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      let isBlackNeighbor = false;
      for (let dy = -1; dy <= 1 && !isBlackNeighbor; dy++) {
        for (let dx = -1; dx <= 1 && !isBlackNeighbor; dx++) {
          const idx = ((y + dy) * w + (x + dx)) * 4;
          if (srcData.data[idx] === 0) isBlackNeighbor = true;
        }
      }
      const idx = (y * w + x) * 4;
      if (isBlackNeighbor) {
        dstData.data[idx] = dstData.data[idx+1] = dstData.data[idx+2] = 0;
      }
    }
  }
  dilCtx.putImageData(dstData, 0, 0);

  const blob = await new Promise(r => dilatedCanvas.toBlob(r, 'image/png'));
  if (!tesseractWorker) await initTesseract();
  const { data } = await tesseractWorker.recognize(blob);
  return data.text.trim().toLowerCase().replace(/[^a-z]/g, '');
}

// ==================== CONFETTI ====================
const confettiCanvas = document.getElementById('confetti-canvas');
const cCtx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiAnimId = null;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  confettiPieces = [];
  const colors = ['#FF6B4A', '#4ECDC4', '#FFE66D', '#A78BFA', '#F472B6', '#22C55E'];
  for (let i = 0; i < 80; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 100,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      life: 1,
    });
  }
  if (!confettiAnimId) animateConfetti();
}

function animateConfetti() {
  cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;
  for (const p of confettiPieces) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.rot += p.rotSpeed;
    p.life -= 0.008;
    if (p.life <= 0) continue;
    alive = true;
    cCtx.save();
    cCtx.translate(p.x, p.y);
    cCtx.rotate(p.rot * Math.PI / 180);
    cCtx.globalAlpha = p.life;
    cCtx.fillStyle = p.color;
    cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cCtx.restore();
  }
  if (alive) {
    confettiAnimId = requestAnimationFrame(animateConfetti);
  } else {
    confettiAnimId = null;
  }
}

// ==================== GAME LOGIC ====================
function getCurrentWord() {
  const words = PHASES[state.phase].words;
  if (state.wordIndex >= state.wordOrder.length) return null;
  return words[state.wordOrder[state.wordIndex]];
}

function shufflePhase() {
  const words = PHASES[state.phase].words;
  state.wordOrder = [...Array(words.length).keys()];
  // Fisher-Yates shuffle
  for (let i = state.wordOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.wordOrder[i], state.wordOrder[j]] = [state.wordOrder[j], state.wordOrder[i]];
  }
  state.wordIndex = 0;
  state.completed = new Set();
}

function updateUI() {
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('score').textContent = state.score;
  const total = PHASES[state.phase].words.length;
  const done = state.completed.size;
  document.getElementById('words-done').innerHTML = `${done}<span style="font-size:0.8rem;font-weight:500;color:var(--text-light)">/<span id="words-total">${total}</span></span>`;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderPhaseSelector() {
  const container = document.getElementById('phase-selector');
  container.innerHTML = '';
  for (const [key, val] of Object.entries(PHASES)) {
    const btn = document.createElement('button');
    btn.className = 'phase-btn' + (parseInt(key) === state.phase ? ' active' : '');
    btn.textContent = val.label;
    btn.onclick = () => {
      state.phase = parseInt(key);
      shufflePhase();
      newWord();
      renderPhaseSelector();
    };
    container.appendChild(btn);
  }
}

function showFeedback(area, type) {
  const word = getCurrentWord();
  if (type === 'correct') {
    const cheer = CHEERS[Math.floor(Math.random() * CHEERS.length)];
    area.innerHTML = `<div class="feedback correct">${cheer}<span class="answer-reveal">${word.toUpperCase()}</span></div>`;
  } else {
    const enc = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    area.innerHTML = `<div class="feedback wrong">${enc}<span class="answer-reveal">${word.toUpperCase()}</span></div>`;
  }
}

function showFallback(area) {
  const word = getCurrentWord();
  area.innerHTML = `
    <div class="fallback-prompt">
      <p>🤔 Couldn't read clearly. The word is:</p>
      <div class="answer-display">${word.toUpperCase()}</div>
      <p>Did you write it correctly?</p>
      <div class="fallback-buttons">
        <button class="fallback-btn yes" onclick="handleFallback('yes')">✅ Yes!</button>
        <button class="fallback-btn no" onclick="handleFallback('no')">❌ No</button>
        <button class="fallback-btn retry" onclick="handleFallback('retry')">🔄 Retry</button>
      </div>
    </div>
  `;
}

function handleFallback(choice) {
  const area = document.getElementById('feedback-area');
  if (choice === 'yes') {
    handleCorrect();
  } else if (choice === 'no') {
    handleWrong();
  } else {
    // retry
    area.innerHTML = '';
    clearCanvas();
    document.getElementById('buttons-main').style.display = 'flex';
    document.getElementById('buttons-next').style.display = 'none';
  }
}

function handleCorrect() {
  const area = document.getElementById('feedback-area');
  state.streak++;
  state.score += (state.streak >= 3 ? 3 : state.streak >= 2 ? 2 : 1);
  state.completed.add(state.wordIndex);
  showFeedback(area, 'correct');
  wrapper.classList.add('correct');
  document.getElementById('keyboard-input').classList.add('correct');
  launchConfetti();
  speak(CHEERS[Math.floor(Math.random() * CHEERS.length)].replace(/[^\w\s]/g, ''), 1.0);
  document.getElementById('buttons-main').style.display = 'none';
  document.getElementById('buttons-next').style.display = 'flex';
  updateUI();
}

function handleWrong() {
  const area = document.getElementById('feedback-area');
  state.streak = 0;
  showFeedback(area, 'wrong');
  wrapper.classList.add('wrong');
  document.getElementById('keyboard-input').classList.add('wrong');
  speak('The word is ' + getCurrentWord());
  document.getElementById('buttons-main').style.display = 'none';
  document.getElementById('buttons-next').style.display = 'flex';
  updateUI();
}

async function checkAnswer() {
  if (state.isChecking) return;
  state.isChecking = true;
  const word = getCurrentWord().toLowerCase();
  const area = document.getElementById('feedback-area');

  if (state.isCanvasMode) {
    if (!state.hasDrawn) {
      state.isChecking = false;
      return;
    }
    // Show loading
    document.getElementById('loading').style.display = 'flex';
    try {
      const recognized = await recognizeCanvas();
      document.getElementById('loading').style.display = 'none';
      
      if (!recognized || recognized.length === 0) {
        // Can't recognize at all — show fallback
        showFallback(area);
        document.getElementById('buttons-main').style.display = 'none';
        document.getElementById('buttons-next').style.display = 'none';
      } else if (recognized === word) {
        handleCorrect();
      } else {
        // Smart OCR tolerance — short words are harder for Tesseract
        const dist = levenshtein(recognized, word);
        // For short words (≤3 chars): any mismatch → ask user (OCR is unreliable)
        // For medium words (4-5 chars): dist ≤ 2 → ask user
        // For longer words (6+ chars): dist ≤ 2 → ask user
        const isUncertain = (word.length <= 3 && dist >= 1)
          || (word.length <= 5 && dist <= 2)
          || (word.length > 5 && dist <= 2);
        if (isUncertain) {
          showFallback(area);
          document.getElementById('buttons-main').style.display = 'none';
          document.getElementById('buttons-next').style.display = 'none';
        } else {
          handleWrong();
        }
      }
    } catch (err) {
      console.error('OCR error:', err);
      document.getElementById('loading').style.display = 'none';
      showFallback(area);
      document.getElementById('buttons-main').style.display = 'none';
      document.getElementById('buttons-next').style.display = 'none';
    }
  } else {
    // Keyboard mode — direct comparison
    const input = document.getElementById('keyboard-input').value.trim().toLowerCase();
    if (!input) { state.isChecking = false; return; }
    if (input === word) {
      handleCorrect();
    } else {
      handleWrong();
    }
  }
  state.isChecking = false;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + (a[i - 1] !== b[j - 1] ? 1 : 0)
      );
  return dp[m][n];
}

async function newWord() {
  // Find next uncompleted word
  const words = PHASES[state.phase].words;
  let found = false;
  for (let i = 0; i < words.length; i++) {
    const idx = (state.wordIndex + i) % state.wordOrder.length;
    if (!state.completed.has(idx)) {
      state.wordIndex = idx;
      found = true;
      break;
    }
  }
  if (!found) {
    // All done! Reshuffle — await so the cheer finishes before the new word is spoken
    launchConfetti();
    setTimeout(() => { launchConfetti(); }, 600);
    await speak('Amazing! You completed all the words!', 0.9);
    shufflePhase();
  }

  clearCanvas();
  document.getElementById('keyboard-input').value = '';
  document.getElementById('keyboard-input').classList.remove('correct', 'wrong');
  wrapper.classList.remove('correct', 'wrong');
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('buttons-main').style.display = 'flex';
  document.getElementById('buttons-next').style.display = 'none';
  updateUI();
  autoSpeak();
}

function skipWord() {
  state.streak = 0;
  state.wordIndex = (state.wordIndex + 1) % state.wordOrder.length;
  newWord();
  updateUI();
}

// ==================== INPUT MODE ====================
function toggleInputMode() {
  state.isCanvasMode = !state.isCanvasMode;
  const toggle = document.getElementById('mode-toggle');
  if (state.isCanvasMode) {
    document.getElementById('canvas-section').style.display = 'block';
    document.getElementById('keyboard-section').style.display = 'none';
    toggle.textContent = 'Switch to keyboard ⌨️';
  } else {
    document.getElementById('canvas-section').style.display = 'none';
    document.getElementById('keyboard-section').style.display = 'block';
    toggle.textContent = 'Switch to handwriting ✏️';
    document.getElementById('keyboard-input').focus();
  }
}

// ==================== EVENT HANDLERS ====================
document.getElementById('listen-btn').addEventListener('click', async function() {
  const word = getCurrentWord();
  if (!word) return;
  this.classList.add('speaking');
  await speak(word);
  // Speak it again for emphasis
  await speak(word);
  this.classList.remove('speaking');
});

document.getElementById('btn-check').addEventListener('click', checkAnswer);
document.getElementById('btn-clear').addEventListener('click', () => {
  clearCanvas();
  document.getElementById('keyboard-input').value = '';
  document.getElementById('keyboard-input').classList.remove('correct', 'wrong');
  wrapper.classList.remove('correct', 'wrong');
  document.getElementById('feedback-area').innerHTML = '';
});
document.getElementById('btn-skip').addEventListener('click', skipWord);
document.getElementById('btn-next').addEventListener('click', () => {
  state.wordIndex = (state.wordIndex + 1) % state.wordOrder.length;
  newWord();
});
document.getElementById('mode-toggle').addEventListener('click', toggleInputMode);

// Keyboard enter to check
document.getElementById('keyboard-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkAnswer();
});

// ==================== ORIENTATION / AUTO-LANDSCAPE ====================
const landscapeQuery = window.matchMedia('(orientation: landscape)');

function onOrientationChange(e) {
  if (!state.tabletMode || state.landscapeManual) return;
  state.landscapeMode = e.matches;
  updateLandscapeUI();
  resizeCanvas();
}

landscapeQuery.addEventListener('change', onOrientationChange);

// ==================== INIT ====================
window.addEventListener('resize', resizeCanvas);

async function init() {
  resizeCanvas();
  renderPhaseSelector();
  shufflePhase();
  updateUI();

  // Start loading Tesseract in the background
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = 'Loading handwriting recognition...';
  try {
    await initTesseract();
  } catch (e) {
    console.warn('Tesseract init failed, keyboard mode will be fallback', e);
  }
  document.getElementById('loading').style.display = 'none';

  autoSpeak();
}

init();
</script>
